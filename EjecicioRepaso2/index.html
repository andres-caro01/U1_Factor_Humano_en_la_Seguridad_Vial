<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo Interactivo: Percepción y Velocidad en Seguridad Vial</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #27728F;
            --primary-dark: #1C546B;
            --primary-light: #EBF1F4;
        }

        body {
            font-family: 'Poppins', sans-serif;
            font-size: 17px;
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f9;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #main-container {
            width: 95%;
            max-width: 1000px;
            height: 870px; 
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(39, 114, 143, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem 3.5rem;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) #f1f1f1;
        }

        .text-custom { color: var(--primary); }
        .bg-custom { background-color: var(--primary); }

        .btn-action {
            background-color: var(--primary);
            color: white;
            padding: 1rem 3.5rem;
            border-radius: 99px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            display: inline-block;
        }
        .btn-action:hover:not(:disabled) {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(39, 114, 143, 0.3);
        }

        .option-card {
            transition: all 0.2s ease;
            border: 2px solid #f1f5f9;
            cursor: pointer;
        }
        
        .option-card.selected {
            border-color: var(--primary);
            background-color: var(--primary-light);
        }

        .option-card.locked { pointer-events: none; }

        .circle-bar { 
            fill: none; 
            stroke: var(--primary); 
            stroke-width: 10; 
            stroke-linecap: round; 
            transition: stroke-dashoffset 1.5s ease-out;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="main-container">
        
        <div id="screen-start" class="scroll-content flex flex-col items-center justify-center text-center animate__animated animate__fadeIn">
            <h1 class="text-4xl font-bold text-custom mb-4 leading-tight">Ejercicios de Repaso</h1>
            <p class="text-2xl mb-4 text-slate-600 font-semibold">Unidad 1: Percepción, Atención y Velocidad en la Vía</p>
            <p class="mb-10 max-w-2xl text-slate-500 text-lg">Evaluación interactiva centrada en los fenómenos visuales, distorsiones de la velocidad y medidas de ingeniería de tránsito para mitigar riesgos.</p>
            <button onclick="startQuiz()" class="btn-action text-xl shadow-lg">INICIAR REPASO</button>
        </div>

        <div id="screen-quiz" class="hidden flex flex-col h-full">
            <div class="px-14 pt-8 flex justify-between items-center bg-white z-10">
                <span id="q-number" class="font-bold text-custom text-sm tracking-widest uppercase"></span>
                <div class="w-48 h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-fill" class="h-full bg-custom transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div class="scroll-content" id="quiz-body">
                <p id="q-instruction" class="text-custom font-bold italic mb-2 text-base"></p>
                <h2 id="q-text" class="text-lg font-semibold mb-6 leading-snug text-slate-800 border-l-4 border-[#27728F] pl-4 py-1 bg-slate-50"></h2>

                <div id="options-container" class="space-y-3"></div>

                <div id="feedback-box" class="hidden mt-6 p-5 rounded-2xl border-2 animate__animated animate__fadeInUp text-base">
                    <p id="feedback-title" class="font-bold text-lg mb-1"></p>
                    <div id="feedback-body" class="leading-relaxed text-slate-700"></div>
                    <button id="btn-continue" onclick="nextStep()" class="mt-4 bg-slate-800 text-white px-8 py-2 rounded-xl hover:bg-black transition-all font-bold text-sm">Continuar</button>
                </div>

                <button id="btn-validate" onclick="validateAnswer()" class="btn-action w-full mt-6 shadow-xl text-lg">Validar Respuesta</button>
            </div>
        </div>

        <div id="screen-results" class="hidden scroll-content flex flex-col items-center justify-center text-center">
            <h2 class="text-4xl font-bold mb-2 text-custom">Repaso Completado</h2>
            <div class="relative flex items-center justify-center my-4">
                <svg class="w-56 h-56 -rotate-90">
                    <circle cx="112" cy="112" r="95" stroke="#f1f5f9" stroke-width="10" fill="none"></circle>
                    <circle id="final-circle" cx="112" cy="112" r="95" class="circle-bar" stroke-dasharray="596" stroke-dashoffset="596"></circle>
                </svg>
                <div class="absolute text-5xl font-black text-slate-800"><span id="result-percent">0</span>%</div>
            </div>
            <p id="result-score" class="text-xl font-bold mb-4 text-slate-700"></p>
            <div id="result-msg" class="max-w-2xl mb-8 p-5 bg-slate-50 rounded-2xl italic text-slate-600 text-base"></div>
            <button onclick="location.reload()" class="btn-action">Reiniciar Repaso</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                type: "ms",
                instruction: "Seleccione la respuesta correcta",
                question: "1. En el caso de un conductor que afirma “no ver” a un ciclista que estaba dentro de su campo visual, ¿cómo se explica el fenómeno de “mirar, pero no ver”?",
                options: [
                    {t: "a) El ciclista no se encontraba dentro del campo visual del conductor.", c: false},
                    {t: "b) El conductor presentó una falla en la agudeza visual.", c: false},
                    {t: "c) El ciclista no generaba un estímulo visual suficiente para ser detectado.", c: false},
                    {t: "d) El estímulo fue percibido visualmente, pero no procesado conscientemente por falta de atención.", c: true}
                ],
                feedback: "La percepción requiere atención para procesar estímulos. Aunque el ciclista estaba en el campo visual, la falta de atención impidió su procesamiento consciente, afectando así la toma de decisiones del conductor."
            },
            {
                type: "ms",
                instruction: "Seleccione la respuesta correcta",
                question: "2. ¿Cuáles de los siguientes factores pueden distorsionar la percepción de la velocidad en la conducción?",
                options: [
                    {t: "a) Contraste visual, complejidad del entorno y tamaño del vehículo observado.", c: true},
                    {t: "b) Iluminación de la vía, experiencia del conductor y señalización horizontal.", c: false},
                    {t: "c) Estado emocional y nivel de fatiga.", c: false},
                    {t: "d) Contraste visual, distancia de seguimiento y condiciones climáticas.", c: false}
                ],
                feedback: "Elementos visuales del entorno influyen en la interpretación del movimiento. Escenarios más complejos o con bajo contraste pueden hacer que se subestime o sobreestime la velocidad, afectando la toma de decisiones al conducir."
            },
            {
                type: "ms",
                instruction: "Seleccione la respuesta correcta",
                question: "3. Según la evidencia experimental, ¿cómo se comporta la percepción de la velocidad a medida que aumenta la velocidad real del vehículo?",
                options: [
                    {t: "a) Se mantiene precisa independientemente de las condiciones del entorno.", c: false},
                    {t: "b) Tiende a sobreestimarse en vías amplias y de alta velocidad.", c: false},
                    {t: "c) Tiende a subestimarse, especialmente en entornos con pocos estímulos visuales.", c: true},
                    {t: "d) Disminuye únicamente cuando hay alta densidad de tráfico.", c: false}
                ],
                feedback: "A mayores velocidades, el sistema perceptivo tiende a reducir la sensación de movimiento. Este efecto se intensifica en vías amplias o con poco contraste visual, lo que favorece la subestimación de la velocidad real."
            },
            {
                type: "ms",
                instruction: "Seleccione la respuesta correcta",
                question: "4. Como ingeniero de tránsito, ¿qué conjunto de medidas considera que es más adecuado para reducir la subestimación de la velocidad en autopistas?",
                options: [
                    {t: "a) Incorporar franjas transversales decrecientes, aumentar la frecuencia de señalización de velocidad y reforzar elementos visuales en los bordes.", c: true},
                    {t: "b) Incrementar el ancho de los carriles y reducir la cantidad de señales verticales.", c: false},
                    {t: "c) Disminuir la iluminación y eliminar elementos visuales laterales para evitar distracciones.", c: false},
                    {t: "d) Mantener el diseño actual y enfocarse en sanciones por exceso de velocidad.", c: false}
                ],
                feedback: "El aumento de estímulos visuales y referencias en la vía mejora la percepción del movimiento, ayudando a que el conductor ajuste mejor su velocidad y reduzca el riesgo asociado a su subestimación."
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let totalPossible = 4; // Ajustado a las 4 preguntas de este bloque

        function startQuiz() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-quiz').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizData[currentIdx];
            document.getElementById('q-number').innerText = `PREGUNTA ${currentIdx + 1}/${quizData.length}`;
            document.getElementById('progress-fill').style.width = `${((currentIdx + 1)/quizData.length)*100}%`;
            document.getElementById('q-instruction').innerText = q.instruction;
            document.getElementById('q-text').innerText = q.question;
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('btn-validate').classList.remove('hidden');

            const optContainer = document.getElementById('options-container');
            optContainer.innerHTML = '';

            q.options.forEach((opt, i) => {
                const d = document.createElement('div');
                d.className = "option-card flex items-center p-4 rounded-xl mb-2 text-base";
                d.innerHTML = `
                    <input type="radio" name="ans" id="o${i}" value="${i}" class="w-5 h-5 accent-[#27728F]">
                    <label for="o${i}" class="ml-4 w-full cursor-pointer font-medium text-slate-700">${opt.t}</label>
                `;
                d.onclick = () => {
                    document.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
                    d.classList.add('selected');
                    d.querySelector('input').checked = true;
                };
                optContainer.appendChild(d);
            });
        }

        function validateAnswer() {
            const q = quizData[currentIdx];
            const sel = document.querySelector('input[name="ans"]:checked');
            if (!sel) { alert("Por favor, seleccione una opción."); return; }
            
            let isCorrect = q.options[sel.value].c;
            if (isCorrect) score++;
            document.querySelectorAll('.option-card').forEach(el => el.classList.add('locked'));
            
            const fBox = document.getElementById('feedback-box');
            fBox.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200');
            document.getElementById('btn-validate').classList.add('hidden');

            const fTitle = document.getElementById('feedback-title');
            if (isCorrect) {
                fTitle.innerText = "¡Correcto!";
                fTitle.className = "font-bold text-lg text-green-700";
                fBox.classList.add('bg-green-50', 'border-green-200');
            } else {
                fTitle.innerText = "Incorrecto";
                fTitle.className = "font-bold text-lg text-red-700";
                fBox.classList.add('bg-red-50', 'border-red-200');
            }
            
            document.getElementById('feedback-body').innerHTML = `<strong>Realimentación:</strong> ${q.feedback}`;
        }

        function nextStep() {
            currentIdx++;
            if (currentIdx < quizData.length) renderQuestion();
            else showResults();
        }

        function showResults() {
            document.getElementById('screen-quiz').classList.add('hidden');
            document.getElementById('screen-results').classList.remove('hidden');
            
            const percent = Math.round((score / totalPossible) * 100);
            const circumference = 596;
            const offset = circumference - (percent / 100) * circumference;
            
            // Sincronización limpia de renderizado para disparar la animación CSS correctamente
            requestAnimationFrame(() => {
                setTimeout(() => {
                    document.getElementById('final-circle').style.strokeDashoffset = offset;
                }, 50);
            });
            
            // Animación del contador numérico
            let count = 0;
            const timer = setInterval(() => {
                if (count >= percent) {
                    document.getElementById('result-percent').innerText = percent;
                    clearInterval(timer);
                } else {
                    count++;
                    document.getElementById('result-percent').innerText = count;
                }
            }, 20);

            document.getElementById('result-score').innerText = `Puntaje Total: ${score} de ${totalPossible} puntos`;
            const msg = document.getElementById('result-msg');
            if (percent === 100) msg.innerText = "¡Excelente! Comprendes con absoluta claridad cómo los factores de atención y el contraste visual alteran los juicios de velocidad en la vía.";
            else if (percent >= 75) msg.innerText = "¡Buen trabajo! Identificas la importancia del diseño del entorno vial y los estímulos visuales periféricos para regular la velocidad.";
            else msg.innerText = "Te sugerimos repasar los efectos de la habituación y los fenómenos cognitivos vinculados a la velocidad autopistas.";
        }
    </script>
</body>
</html>
